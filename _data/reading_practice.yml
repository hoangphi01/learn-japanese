# ============================================================
# READING PRACTICE — Short Japanese texts with furigana + vocab
# Level: N5 beginner
# ============================================================

- id: "jikoshoukai"
  title: "自己紹介 — Tự giới thiệu"
  level: "N5"
  tags: ["greetings", "basic"]
  text_html: |
    <ruby>私<rp>(</rp><rt>わたし</rt><rp>)</rp></ruby>は<ruby>田中<rp>(</rp><rt>たなか</rt><rp>)</rp></ruby>リンです。ベトナム<ruby>人<rp>(</rp><rt>じん</rt><rp>)</rp></ruby>です。<ruby>今<rp>(</rp><rt>いま</rt><rp>)</rp></ruby>、<ruby>東京<rp>(</rp><rt>とうきょう</rt><rp>)</rp></ruby>に<ruby>住<rp>(</rp><rt>す</rt><rp>)</rp></ruby>んでいます。<ruby>会社員<rp>(</rp><rt>かいしゃいん</rt><rp>)</rp></ruby>です。<ruby>毎日<rp>(</rp><rt>まいにち</rt><rp>)</rp></ruby>、<ruby>電車<rp>(</rp><rt>でんしゃ</rt><rp>)</rp></ruby>で<ruby>会社<rp>(</rp><rt>かいしゃ</rt><rp>)</rp></ruby>に<ruby>行<rp>(</rp><rt>い</rt><rp>)</rp></ruby>きます。<ruby>日本語<rp>(</rp><rt>にほんご</rt><rp>)</rp></ruby>を<ruby>勉強<rp>(</rp><rt>べんきょう</rt><rp>)</rp></ruby>しています。
  translation: "Tôi là Tanaka Linh. Là người Việt Nam. Hiện đang sống ở Tokyo. Là nhân viên công ty. Mỗi ngày, đi tàu điện đến công ty. Đang học tiếng Nhật."
  vocabulary:
    - { word: "私", reading: "わたし", meaning: "tôi" }
    - { word: "住んでいます", reading: "すんでいます", meaning: "đang sống" }
    - { word: "会社員", reading: "かいしゃいん", meaning: "nhân viên công ty" }
    - { word: "毎日", reading: "まいにち", meaning: "mỗi ngày" }
    - { word: "勉強", reading: "べんきょう", meaning: "học tập" }

- id: "nichijou"
  title: "一日 — Một ngày bình thường"
  level: "N5"
  tags: ["daily-life", "time"]
  text_html: |
    <ruby>朝<rp>(</rp><rt>あさ</rt><rp>)</rp></ruby>、<ruby>六時<rp>(</rp><rt>ろくじ</rt><rp>)</rp></ruby>に<ruby>起<rp>(</rp><rt>お</rt><rp>)</rp></ruby>きます。<ruby>朝<rp>(</rp><rt>あさ</rt><rp>)</rp></ruby>ごはんを<ruby>食<rp>(</rp><rt>た</rt><rp>)</rp></ruby>べます。コーヒーを<ruby>飲<rp>(</rp><rt>の</rt><rp>)</rp></ruby>みます。<ruby>八時<rp>(</rp><rt>はちじ</rt><rp>)</rp></ruby>に<ruby>学校<rp>(</rp><rt>がっこう</rt><rp>)</rp></ruby>に<ruby>行<rp>(</rp><rt>い</rt><rp>)</rp></ruby>きます。<ruby>十二時<rp>(</rp><rt>じゅうにじ</rt><rp>)</rp></ruby>に<ruby>昼<rp>(</rp><rt>ひる</rt><rp>)</rp></ruby>ごはんを<ruby>食<rp>(</rp><rt>た</rt><rp>)</rp></ruby>べます。<ruby>三時<rp>(</rp><rt>さんじ</rt><rp>)</rp></ruby>に<ruby>家<rp>(</rp><rt>いえ</rt><rp>)</rp></ruby>に<ruby>帰<rp>(</rp><rt>かえ</rt><rp>)</rp></ruby>ります。<ruby>夜<rp>(</rp><rt>よる</rt><rp>)</rp></ruby>、テレビを<ruby>見<rp>(</rp><rt>み</rt><rp>)</rp></ruby>ます。
  translation: "Sáng, dậy lúc 6 giờ. Ăn sáng. Uống cà phê. 8 giờ đi học. 12 giờ ăn trưa. 3 giờ về nhà. Tối, xem TV."
  vocabulary:
    - { word: "朝", reading: "あさ", meaning: "buổi sáng" }
    - { word: "起きます", reading: "おきます", meaning: "dậy" }
    - { word: "学校", reading: "がっこう", meaning: "trường học" }
    - { word: "昼ごはん", reading: "ひるごはん", meaning: "bữa trưa" }
    - { word: "帰ります", reading: "かえります", meaning: "về nhà" }
    - { word: "夜", reading: "よる", meaning: "buổi tối" }

- id: "kaimono"
  title: "買い物 — Đi mua sắm"
  level: "N5"
  tags: ["shopping", "conversation"]
  text_html: |
    <ruby>昨日<rp>(</rp><rt>きのう</rt><rp>)</rp></ruby>、スーパーに<ruby>行<rp>(</rp><rt>い</rt><rp>)</rp></ruby>きました。<ruby>果物<rp>(</rp><rt>くだもの</rt><rp>)</rp></ruby>と<ruby>野菜<rp>(</rp><rt>やさい</rt><rp>)</rp></ruby>を<ruby>買<rp>(</rp><rt>か</rt><rp>)</rp></ruby>いました。りんごは<ruby>三<rp>(</rp><rt>みっ</rt><rp>)</rp></ruby>つ、<ruby>百円<rp>(</rp><rt>ひゃくえん</rt><rp>)</rp></ruby>でした。<ruby>安<rp>(</rp><rt>やす</rt><rp>)</rp></ruby>いです。<ruby>魚<rp>(</rp><rt>さかな</rt><rp>)</rp></ruby>も<ruby>買<rp>(</rp><rt>か</rt><rp>)</rp></ruby>いました。<ruby>全部<rp>(</rp><rt>ぜんぶ</rt><rp>)</rp></ruby>で<ruby>千二百円<rp>(</rp><rt>せんにひゃくえん</rt><rp>)</rp></ruby>でした。
  translation: "Hôm qua, đi siêu thị. Mua trái cây và rau. Táo 3 quả, 100 yên. Rẻ. Cũng mua cá. Tổng cộng 1200 yên."
  vocabulary:
    - { word: "昨日", reading: "きのう", meaning: "hôm qua" }
    - { word: "果物", reading: "くだもの", meaning: "trái cây" }
    - { word: "野菜", reading: "やさい", meaning: "rau" }
    - { word: "安い", reading: "やすい", meaning: "rẻ" }
    - { word: "全部", reading: "ぜんぶ", meaning: "tổng cộng" }

- id: "ryokou"
  title: "旅行 — Du lịch"
  level: "N5"
  tags: ["travel", "description"]
  text_html: |
    <ruby>来月<rp>(</rp><rt>らいげつ</rt><rp>)</rp></ruby>、<ruby>京都<rp>(</rp><rt>きょうと</rt><rp>)</rp></ruby>に<ruby>旅行<rp>(</rp><rt>りょこう</rt><rp>)</rp></ruby>します。<ruby>新幹線<rp>(</rp><rt>しんかんせん</rt><rp>)</rp></ruby>で<ruby>行<rp>(</rp><rt>い</rt><rp>)</rp></ruby>きます。<ruby>京都<rp>(</rp><rt>きょうと</rt><rp>)</rp></ruby>は<ruby>古<rp>(</rp><rt>ふる</rt><rp>)</rp></ruby>い<ruby>町<rp>(</rp><rt>まち</rt><rp>)</rp></ruby>です。<ruby>有名<rp>(</rp><rt>ゆうめい</rt><rp>)</rp></ruby>な<ruby>神社<rp>(</rp><rt>じんじゃ</rt><rp>)</rp></ruby>がたくさんあります。<ruby>日本<rp>(</rp><rt>にほん</rt><rp>)</rp></ruby>の<ruby>料理<rp>(</rp><rt>りょうり</rt><rp>)</rp></ruby>を<ruby>食<rp>(</rp><rt>た</rt><rp>)</rp></ruby>べたいです。<ruby>写真<rp>(</rp><rt>しゃしん</rt><rp>)</rp></ruby>をたくさん<ruby>撮<rp>(</rp><rt>と</rt><rp>)</rp></ruby>りたいです。
  translation: "Tháng sau, du lịch Kyoto. Đi bằng Shinkansen. Kyoto là thành phố cổ. Có nhiều đền nổi tiếng. Muốn ăn món Nhật. Muốn chụp nhiều ảnh."
  vocabulary:
    - { word: "来月", reading: "らいげつ", meaning: "tháng sau" }
    - { word: "旅行", reading: "りょこう", meaning: "du lịch" }
    - { word: "新幹線", reading: "しんかんせん", meaning: "tàu Shinkansen" }
    - { word: "有名", reading: "ゆうめい", meaning: "nổi tiếng" }
    - { word: "神社", reading: "じんじゃ", meaning: "đền thần đạo" }
    - { word: "写真", reading: "しゃしん", meaning: "ảnh" }

- id: "kazoku"
  title: "家族 — Gia đình"
  level: "N5"
  tags: ["family", "description"]
  text_html: |
    <ruby>私<rp>(</rp><rt>わたし</rt><rp>)</rp></ruby>の<ruby>家族<rp>(</rp><rt>かぞく</rt><rp>)</rp></ruby>は<ruby>五人<rp>(</rp><rt>ごにん</rt><rp>)</rp></ruby>です。<ruby>父<rp>(</rp><rt>ちち</rt><rp>)</rp></ruby>と<ruby>母<rp>(</rp><rt>はは</rt><rp>)</rp></ruby>と<ruby>兄<rp>(</rp><rt>あに</rt><rp>)</rp></ruby>と<ruby>姉<rp>(</rp><rt>あね</rt><rp>)</rp></ruby>と<ruby>私<rp>(</rp><rt>わたし</rt><rp>)</rp></ruby>です。<ruby>父<rp>(</rp><rt>ちち</rt><rp>)</rp></ruby>は<ruby>医者<rp>(</rp><rt>いしゃ</rt><rp>)</rp></ruby>です。<ruby>母<rp>(</rp><rt>はは</rt><rp>)</rp></ruby>は<ruby>先生<rp>(</rp><rt>せんせい</rt><rp>)</rp></ruby>です。<ruby>兄<rp>(</rp><rt>あに</rt><rp>)</rp></ruby>は<ruby>大学生<rp>(</rp><rt>だいがくせい</rt><rp>)</rp></ruby>です。<ruby>姉<rp>(</rp><rt>あね</rt><rp>)</rp></ruby>は<ruby>会社<rp>(</rp><rt>かいしゃ</rt><rp>)</rp></ruby>で<ruby>働<rp>(</rp><rt>はたら</rt><rp>)</rp></ruby>いています。
  translation: "Gia đình tôi có 5 người. Bố, mẹ, anh trai, chị gái và tôi. Bố là bác sĩ. Mẹ là giáo viên. Anh trai là sinh viên đại học. Chị gái làm việc ở công ty."
  vocabulary:
    - { word: "家族", reading: "かぞく", meaning: "gia đình" }
    - { word: "父", reading: "ちち", meaning: "bố (khi nói về bố mình)" }
    - { word: "母", reading: "はは", meaning: "mẹ (khi nói về mẹ mình)" }
    - { word: "医者", reading: "いしゃ", meaning: "bác sĩ" }
    - { word: "大学生", reading: "だいがくせい", meaning: "sinh viên đại học" }
    - { word: "働いています", reading: "はたらいています", meaning: "đang làm việc" }
