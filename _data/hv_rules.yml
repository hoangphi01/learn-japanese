- id: 1
  hv_pattern: "T- đầu → S-, Th- đầu → Sh-/S-"
  onyomi: "S-/Sh-"
  description: "Phụ âm T- trong HV thường thành S- trong On'yomi. Riêng Th- (âm bật hơi) thành Sh- hoặc S-. Không lẫn Z- vì Z- không productive."
  onset_patterns:
    - from: "t"
      to: "s"
    - from: "th"
      to: "sh"
  examples:
    - hv: "Tâm"
      jp: "Shin (心)"
    - hv: "Tử"
      jp: "Shi (死)"
    - hv: "Thủy"
      jp: "Sui (水)"
    - hv: "Thượng"
      jp: "Shō (上)"

- id: 2
  hv_pattern: "-c/-ch cuối"
  onyomi: "-ku/-ki"
  description: "Âm tắc cuối -c hoặc -ch trong HV tương ứng -ku hoặc -ki trong On'yomi. Sau nguyên âm đơn thường là -ku, sau -i thường là -ki."
  coda_patterns:
    - from: "c"
      to: "ku"
    - from: "ch"
      to: "ki"
  examples:
    - hv: "Học"
      jp: "Gaku (学)"
    - hv: "Quốc"
      jp: "Koku (国)"
    - hv: "Mục"
      jp: "Moku (目)"
    - hv: "Nhạc"
      jp: "Gaku (楽)"

- id: 3
  hv_pattern: "-t cuối"
  onyomi: "-tsu/-chi"
  description: "Âm tắc cuối -t trong HV thành -tsu hoặc -chi. Sau -i thường thành -chi (Nhất→Ichi), các trường hợp khác thường là -tsu (Phật→Butsu)."
  coda_patterns:
    - from: "t"
      to: "tsu"
  examples:
    - hv: "Nhất"
      jp: "Ichi (一)"
    - hv: "Phật"
      jp: "Butsu (仏)"
    - hv: "Nhật"
      jp: "Nichi (日)"
    - hv: "Xuất"
      jp: "Shutsu (出)"

- id: 4
  hv_pattern: "-ng/-nh cuối → trường âm"
  onyomi: "-ō/-ū/-ei"
  description: "Âm cuối -ng hoặc -nh biến mất, thay bằng trường âm. Quy luật phụ thuộc nguyên âm trước: -ong/-ông→-ō, -ung/-ưng→-ū, -anh/-inh→-ei, -ang→-ō. Ví dụ: Kinh→Kei/Kyō (âm cuối -nh, nguyên âm -i)."
  coda_patterns:
    - from: "ong"
      to: "ou"
    - from: "ung"
      to: "uu"
    - from: "anh"
      to: "ei"
    - from: "inh"
      to: "ei"
    - from: "ang"
      to: "ou"
  examples:
    - hv: "Đường"
      jp: "Dō (道)"
    - hv: "Không"
      jp: "Kū (空)"
    - hv: "Trung"
      jp: "Chū (中)"
    - hv: "Kinh"
      jp: "Kyō (京)"
    - hv: "Thanh"
      jp: "Sei (青)"

- id: 5
  hv_pattern: "Đ- đầu"
  onyomi: "D-"
  description: "Phụ âm Đ- trong HV tương ứng D- trong On'yomi. Đây là ánh xạ rất đều đặn."
  onset_patterns:
    - from: "d"
      to: "d"
  examples:
    - hv: "Đại"
      jp: "Dai (大)"
    - hv: "Độc"
      jp: "Doku (読)"
    - hv: "Điện"
      jp: "Den (電)"

- id: 6
  hv_pattern: "Nh- đầu"
  onyomi: "Ni-/Jin-"
  description: "Nh- đầu trong HV thường thành Ni- hoặc Jin-/Nin- trong On'yomi. Trước nguyên âm -â/-a thường thành Jin, trước -ậ/-ập thành Nyū."
  onset_patterns:
    - from: "nh"
      to: "ni"
  examples:
    - hv: "Nhân"
      jp: "Jin (人)"
    - hv: "Nhật"
      jp: "Nichi (日)"
    - hv: "Nhập"
      jp: "Nyū (入)"

- id: 7
  hv_pattern: "-n cuối"
  onyomi: "-n giữ nguyên"
  description: "Âm mũi cuối -n trong HV giữ nguyên thành -n trong On'yomi. Lưu ý: chỉ áp dụng cho -n, KHÔNG áp dụng cho -nh hay -ng (xem Quy tắc 4)."
  coda_patterns:
    - from: "n"
      to: "n"
  examples:
    - hv: "Quan"
      jp: "Kan (関)"
    - hv: "Sơn"
      jp: "San (山)"
    - hv: "Nhân"
      jp: "Jin (人)"
    - hv: "Bản"
      jp: "Hon (本)"

- id: 8
  hv_pattern: "Ph- đầu"
  onyomi: "H-/F-"
  description: "Ph- đầu trong HV tương ứng H- hoặc F- trong On'yomi. Trước -u thường giữ F- (Phú→Fu, Phong→Fū), các trường hợp khác thường thành H- (Pháp→Hō)."
  onset_patterns:
    - from: "ph"
      to: "h"
  examples:
    - hv: "Phong"
      jp: "Fū (風)"
    - hv: "Pháp"
      jp: "Hō (法)"
    - hv: "Phú"
      jp: "Fu (富)"
    - hv: "Phương"
      jp: "Hō (方)"

- id: 9
  hv_pattern: "-m cuối"
  onyomi: "-n"
  description: "Âm mũi cuối -m trong HV chuyển thành -n trong On'yomi. Tiếng Nhật không phân biệt -m/-n ở vị trí cuối — cả hai đều thành ン (n)."
  coda_patterns:
    - from: "m"
      to: "n"
  examples:
    - hv: "Âm"
      jp: "On (音)"
    - hv: "Kim"
      jp: "Kin (金)"
    - hv: "Tâm"
      jp: "Shin (心)"
    - hv: "Lâm"
      jp: "Rin (林)"

- id: 10
  hv_pattern: "-p cuối"
  onyomi: "-u/-ū"
  description: "Âm tắc cuối -p trong HV biến mất, thay bằng trường âm -u hoặc -ū trong On'yomi. Đây là do tiếng Nhật không cho phép âm tắc cuối -p."
  coda_patterns:
    - from: "p"
      to: "u"
  examples:
    - hv: "Nhập"
      jp: "Nyū (入)"
    - hv: "Thập"
      jp: "Jū (十)"
    - hv: "Pháp"
      jp: "Hō (法)"

- id: 11
  hv_pattern: "Ng- đầu"
  onyomi: "G-"
  description: "Phụ âm Ng- (ngạc mũi) trong HV tương ứng G- trong On'yomi. Tiếng Nhật đơn giản hóa âm mũi ngạc thành g- thuần."
  onset_patterns:
    - from: "ng"
      to: "g"
  examples:
    - hv: "Ngọ"
      jp: "Go (午)"
    - hv: "Ngân"
      jp: "Gin (銀)"
    - hv: "Ngoại"
      jp: "Gai (外)"
    - hv: "Nguyên"
      jp: "Gen (元)"

- id: 12
  hv_pattern: "Kh- đầu"
  onyomi: "K-"
  description: "Phụ âm bật hơi Kh- trong HV tương ứng K- trong On'yomi. Tiếng Nhật không phân biệt âm bật hơi / không bật hơi nên Kh- → K-."
  onset_patterns:
    - from: "kh"
      to: "k"
  examples:
    - hv: "Khí"
      jp: "Ki (気)"
    - hv: "Không"
      jp: "Kū (空)"
    - hv: "Khách"
      jp: "Kyaku (客)"

- id: 13
  hv_pattern: "L- đầu"
  onyomi: "R-"
  description: "Phụ âm L- trong HV tương ứng R- trong On'yomi. Tiếng Nhật dùng ら行 (ra-gyō) cho cả L và R vì không phân biệt hai âm này."
  onset_patterns:
    - from: "l"
      to: "r"
  examples:
    - hv: "Lý"
      jp: "Ri (理)"
    - hv: "Lưu"
      jp: "Ryū (留)"
    - hv: "Lữ"
      jp: "Ryo (旅)"
    - hv: "Lực"
      jp: "Ryoku (力)"

- id: 14
  hv_pattern: "Qu- đầu"
  onyomi: "K-"
  description: "Phụ âm Qu- trong HV (từ Hán ngữ cổ) tương ứng K- trong On'yomi. Thành phần -u- bán nguyên âm thường mất đi hoặc hòa vào nguyên âm sau."
  onset_patterns:
    - from: "qu"
      to: "k"
  examples:
    - hv: "Quan"
      jp: "Kan (関)"
    - hv: "Quốc"
      jp: "Koku (国)"
    - hv: "Quang"
      jp: "Kō (光)"

- id: 15
  hv_pattern: "B- đầu"
  onyomi: "H-/B-"
  description: "Phụ âm B- trong HV có thể tương ứng H- hoặc B- trong On'yomi. Ban đầu đều là H- (Bản→Hon), nhưng một số giữ B- (Bệnh→Byō). Xu hướng: trước nguyên âm -a/-o thường là H-, trước -e/-y thường giữ B-."
  onset_patterns:
    - from: "b"
      to: "h"
  examples:
    - hv: "Bản"
      jp: "Hon (本)"
    - hv: "Bách"
      jp: "Hyaku (百)"
    - hv: "Bệnh"
      jp: "Byō (病)"
    - hv: "Bán"
      jp: "Han (半)"
