# Travel Phrasebook — Sổ Tay Du Lịch Nhật Bản
# 8 categories, ~120 phrases

- category: "chao-hoi"
  title: "Chào hỏi"
  icon: "👋"
  phrases:
    - vi: "Xin chào"
      jp: "こんにちは"
      romaji: "Konnichiwa"
      note: "Dùng ban ngày"
    - vi: "Chào buổi sáng"
      jp: "おはようございます"
      romaji: "Ohayou gozaimasu"
    - vi: "Chào buổi tối"
      jp: "こんばんは"
      romaji: "Konbanwa"
    - vi: "Chúc ngủ ngon"
      jp: "おやすみなさい"
      romaji: "Oyasuminasai"
    - vi: "Cảm ơn"
      jp: "ありがとうございます"
      romaji: "Arigatou gozaimasu"
    - vi: "Không có gì / Không sao"
      jp: "どういたしまして"
      romaji: "Dou itashimashite"
    - vi: "Xin lỗi (cho tôi hỏi)"
      jp: "すみません"
      romaji: "Sumimasen"
      note: "Vừa xin lỗi vừa gọi chú ý"
    - vi: "Xin lỗi (trang trọng)"
      jp: "ごめんなさい"
      romaji: "Gomen nasai"
    - vi: "Vâng / Đúng"
      jp: "はい"
      romaji: "Hai"
    - vi: "Không"
      jp: "いいえ"
      romaji: "Iie"
    - vi: "Tạm biệt"
      jp: "さようなら"
      romaji: "Sayounara"
    - vi: "Hẹn gặp lại"
      jp: "またね"
      romaji: "Mata ne"
      note: "Thân mật"

- category: "di-chuyen"
  title: "Di chuyển"
  icon: "🚃"
  phrases:
    - vi: "... ở đâu?"
      jp: "...はどこですか？"
      romaji: "... wa doko desu ka?"
    - vi: "Ga tàu ở đâu?"
      jp: "駅はどこですか？"
      romaji: "Eki wa doko desu ka?"
    - vi: "Nhà vệ sinh ở đâu?"
      jp: "トイレはどこですか？"
      romaji: "Toire wa doko desu ka?"
    - vi: "Tôi muốn đến..."
      jp: "...に行きたいです"
      romaji: "... ni ikitai desu"
    - vi: "Bao xa?"
      jp: "どのくらい遠いですか？"
      romaji: "Dono kurai tooi desu ka?"
    - vi: "Đi bộ được không?"
      jp: "歩いて行けますか？"
      romaji: "Aruite ikemasu ka?"
    - vi: "Cho tôi một vé"
      jp: "切符を一枚ください"
      romaji: "Kippu wo ichimai kudasai"
    - vi: "Vé khứ hồi"
      jp: "往復切符"
      romaji: "Oufuku kippu"
    - vi: "Tàu tiếp theo mấy giờ?"
      jp: "次の電車は何時ですか？"
      romaji: "Tsugi no densha wa nanji desu ka?"
    - vi: "Chuyến cuối mấy giờ?"
      jp: "終電は何時ですか？"
      romaji: "Shuuden wa nanji desu ka?"
      note: "Rất quan trọng ở Nhật!"
    - vi: "Rẽ trái"
      jp: "左に曲がってください"
      romaji: "Hidari ni magatte kudasai"
    - vi: "Rẽ phải"
      jp: "右に曲がってください"
      romaji: "Migi ni magatte kudasai"
    - vi: "Đi thẳng"
      jp: "まっすぐ行ってください"
      romaji: "Massugu itte kudasai"
    - vi: "Dừng ở đây (taxi)"
      jp: "ここで止めてください"
      romaji: "Koko de tomete kudasai"
    - vi: "Cho tôi đến đây (chỉ bản đồ)"
      jp: "ここまでお願いします"
      romaji: "Koko made onegai shimasu"
    - vi: "Xe buýt số mấy?"
      jp: "何番のバスですか？"
      romaji: "Nanban no basu desu ka?"
    - vi: "Tàu này đi đến... không?"
      jp: "この電車は...に行きますか？"
      romaji: "Kono densha wa ... ni ikimasu ka?"
    - vi: "Lối ra ở đâu?"
      jp: "出口はどこですか？"
      romaji: "Deguchi wa doko desu ka?"

- category: "mua-sam"
  title: "Mua sắm"
  icon: "🛍"
  phrases:
    - vi: "Cái này bao nhiêu tiền?"
      jp: "これはいくらですか？"
      romaji: "Kore wa ikura desu ka?"
    - vi: "Mắc quá!"
      jp: "高すぎます！"
      romaji: "Takasugimasu!"
    - vi: "Rẻ hơn được không?"
      jp: "もう少し安くなりますか？"
      romaji: "Mou sukoshi yasuku narimasu ka?"
      note: "Thường không mặc cả ở Nhật, trừ chợ"
    - vi: "Cho tôi xem cái này"
      jp: "これを見せてください"
      romaji: "Kore wo misete kudasai"
    - vi: "Có size khác không?"
      jp: "他のサイズはありますか？"
      romaji: "Hoka no saizu wa arimasu ka?"
    - vi: "Có màu khác không?"
      jp: "他の色はありますか？"
      romaji: "Hoka no iro wa arimasu ka?"
    - vi: "Tôi mua cái này"
      jp: "これをください"
      romaji: "Kore wo kudasai"
    - vi: "Trả bằng thẻ được không?"
      jp: "カードで払えますか？"
      romaji: "Kaado de haraemasu ka?"
    - vi: "Tiền mặt"
      jp: "現金"
      romaji: "Genkin"
    - vi: "Túi / Bao bì"
      jp: "袋をください"
      romaji: "Fukuro wo kudasai"
    - vi: "Miễn thuế"
      jp: "免税"
      romaji: "Menzei"
      note: "Tax-free cho du khách"
    - vi: "Quà tặng (gói quà)"
      jp: "プレゼント用にお願いします"
      romaji: "Purezento you ni onegai shimasu"
    - vi: "Cửa hàng tiện lợi"
      jp: "コンビニ"
      romaji: "Konbini"
    - vi: "Siêu thị ở đâu?"
      jp: "スーパーはどこですか？"
      romaji: "Suupaa wa doko desu ka?"
    - vi: "Máy ATM ở đâu?"
      jp: "ATMはどこですか？"
      romaji: "ATM wa doko desu ka?"

- category: "an-uong"
  title: "Ăn uống"
  icon: "🍜"
  phrases:
    - vi: "Tôi đói"
      jp: "お腹が空きました"
      romaji: "Onaka ga sukimashita"
    - vi: "Cho tôi xem menu"
      jp: "メニューをお願いします"
      romaji: "Menyuu wo onegai shimasu"
    - vi: "Món nào ngon nhất?"
      jp: "おすすめは何ですか？"
      romaji: "Osusume wa nan desu ka?"
    - vi: "Cho tôi cái này"
      jp: "これをお願いします"
      romaji: "Kore wo onegai shimasu"
      note: "Chỉ vào menu"
    - vi: "Cho tôi thêm nước"
      jp: "お水をください"
      romaji: "Omizu wo kudasai"
    - vi: "Ngon lắm!"
      jp: "おいしいです！"
      romaji: "Oishii desu!"
    - vi: "Tôi ăn chay"
      jp: "ベジタリアンです"
      romaji: "Bejitarian desu"
    - vi: "Tôi bị dị ứng với..."
      jp: "...アレルギーがあります"
      romaji: "... arerugii ga arimasu"
      note: "Rất quan trọng!"
    - vi: "Không có thịt"
      jp: "肉なしでお願いします"
      romaji: "Niku nashi de onegai shimasu"
    - vi: "Tính tiền"
      jp: "お会計お願いします"
      romaji: "Okaikei onegai shimasu"
    - vi: "Trả riêng"
      jp: "別々でお願いします"
      romaji: "Betsubetsu de onegai shimasu"
    - vi: "Xin mời dùng bữa"
      jp: "いただきます"
      romaji: "Itadakimasu"
      note: "Nói trước khi ăn"
    - vi: "Cảm ơn bữa ăn"
      jp: "ごちそうさまでした"
      romaji: "Gochisousama deshita"
      note: "Nói sau khi ăn"
    - vi: "Cho tôi thêm một phần"
      jp: "おかわりをください"
      romaji: "Okawari wo kudasai"
    - vi: "Bia"
      jp: "ビール"
      romaji: "Biiru"
    - vi: "Trà xanh"
      jp: "お茶"
      romaji: "Ocha"
    - vi: "Cà phê"
      jp: "コーヒー"
      romaji: "Koohii"
    - vi: "Đặt bàn cho 2 người"
      jp: "二人ですが、席はありますか？"
      romaji: "Futari desu ga, seki wa arimasu ka?"

